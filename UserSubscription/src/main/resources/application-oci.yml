server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: user-subscription
  boot:
    admin:
      enabled: false
  
  # OCI Autonomous AI Database connection
  # Connects directly to OCI using TCPS (secure connection)
  # Requires: Oracle Wallet for certificate validation
  # Get wallet from OCI Console:
  #   Databases → user-subscription-aidb → Database Connection → Download Wallet
  # Then set: export TNS_ADMIN=$HOME/.oci/wallet
  datasource:
    # Direct JDBC connection to OCI Autonomous Database
    # Uses environment variables: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
    # TNS_ADMIN environment variable must point to extracted wallet directory
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@usersubdb_high?TNS_ADMIN=${TNS_ADMIN}}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:UserSubscription@123}
    driver-class-name: ${DB_DRIVER:oracle.jdbc.OracleDriver}
  
  # Connection pool configuration optimized for Autonomous Database
  hikari:
    maximum-pool-size: 20
    minimum-idle: 5
    connection-timeout: 30000
    idle-timeout: 900000
    max-lifetime: 1800000
    auto-commit: true

# Springdoc OpenAPI (Swagger) configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Application-specific configuration
app:
  persistence:
    type: rdbms
  
  # Database initialization settings
  database:
    auto-create: true
    auto-init-schema: true

# Logging configuration
logging:
  level:
    root: INFO
    com.agentic.subscription: INFO
    oracle: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
