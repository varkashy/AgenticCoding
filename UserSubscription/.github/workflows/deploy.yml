name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      # 3. Build JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 5. Login to ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin \
          230989377092.dkr.ecr.us-east-1.amazonaws.com

      # 6. Build and push Docker image
      - name: Build and push Docker image
        run: |
          docker buildx build --platform linux/amd64 -t user-subscription .
          docker tag user-subscription:latest \
            230989377092.dkr.ecr.us-east-1.amazonaws.com/user-subscription:latest
          docker push \
            230989377092.dkr.ecr.us-east-1.amazonaws.com/user-subscription:latest

      # 7. Deploy to Primary EC2
      - name: Deploy to Primary EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.PRIMARY_EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin \
              230989377092.dkr.ecr.us-east-1.amazonaws.com
            docker pull 230989377092.dkr.ecr.us-east-1.amazonaws.com/user-subscription:latest
            docker stop usersubscription || true
            docker rm usersubscription || true
            docker run -d \
              --name usersubscription \
              --restart always \
              -p 8080:8080 \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              230989377092.dkr.ecr.us-east-1.amazonaws.com/user-subscription:latest

      # 8. Deploy to Secondary EC2
      - name: Deploy to Secondary EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SECONDARY_EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin \
              230989377092.dkr.ecr.us-east-1.amazonaws.com
            docker pull 230989377092.dkr.ecr.us-east-1.amazonaws.com/user-subscription:latest
            docker stop usersubscription || true
            docker rm usersubscription || true
            docker run -d \
              --name usersubscription \
              --restart always \
              -p 8080:8080 \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              230989377092.dkr.ecr.us-east-1.amazonaws.com/user-subscription:latest
